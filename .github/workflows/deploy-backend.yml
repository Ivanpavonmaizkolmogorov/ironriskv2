name: Deploy Backend to Hetzner

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Copy backend files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "backend"
          target: "/var/www/ironrisk/"
          strip_components: 0 # ensures it copies as /var/www/ironrisk/backend/

      - name: Run DB Migrations & Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/ironrisk/backend
            source /var/www/ironrisk/backend/venv/bin/activate || true
            pip install -q -r requirements.txt 2>/dev/null
            find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            # Fix stuck alembic version from broken migration chain
            python -c "
            from models.database import engine
            from sqlalchemy import text
            with engine.begin() as conn:
                ver = conn.execute(text('SELECT version_num FROM alembic_version')).scalar()
                if ver and ver not in ['8b58e34200b4', 'f001_consolidated']:
                    conn.execute(text(\"UPDATE alembic_version SET version_num = '8b58e34200b4'\"))
                    print(f'Fixed alembic: {ver} -> 8b58e34200b4')
                else:
                    print(f'Alembic OK at {ver}')
            " 2>&1
            alembic upgrade head 2>&1 || echo "ALEMBIC MIGRATION FAILED"
            systemctl restart ironrisk
            echo ""
            echo "--- Service Status ---"
            systemctl status ironrisk --no-pager

      - name: Broadcast Beta Emails
        if: "contains(github.event.head_commit.message, '[broadcast-beta]')"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/ironrisk/backend
            source /var/www/ironrisk/backend/venv/bin/activate || true
            PYTHONPATH=. python scripts/broadcast_beta.py
